<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASMI Cinematic Motion Trial</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:100%; height:100vh; overflow:hidden; font-family:'Montserrat',sans-serif; background:#000; }
  
  .split-container { display:flex; width:100%; height:100vh; position:relative; }
  
  /* ── MEDICAL PANEL ── */
  .med-panel {
    position:absolute; inset:0; width:52%; height:100%; background:#FFD700; z-index:2;
    clip-path:polygon(0 0, 88% 0, 100% 100%, 0 100%);
    transition: clip-path 0.75s cubic-bezier(0.85, 0, 0.15, 1);
  }
  
  /* ── ENGINEERING PANEL ── */
  .eng-panel {
    position:absolute; inset:0; width:100%; height:100%; background:#0a1628; z-index:1;
    display:flex; justify-content:flex-end; align-items:center;
    transition: transform 0.75s cubic-bezier(0.85, 0, 0.15, 1);
  }

  /* ── SEAM LINE ── */
  .seam {
    position:absolute; inset:0; width:52%; height:100%; z-index:3; pointer-events:none;
    clip-path:polygon(0 0, 88% 0, 100% 100%, 0 100%);
    transition: clip-path 0.75s cubic-bezier(0.85, 0, 0.15, 1);
  }
  .seam::after {
    content:''; position:absolute; top:0; right:0; width:4px; height:100%;
    background:linear-gradient(to bottom, #FFD700, #ffffff 50%, #00C8B4);
  }

  /* ── CINEMATIC LASER INCISION CURTAIN ── */
  .laser-beam {
    position:absolute; top:0; left:0; width:100%; height:100%; 
    background: #ffffff;
    box-shadow: 0 0 40px 10px #ffffff, 0 0 80px 20px #6a0dad;
    z-index:4;
    opacity: 0;
    clip-path:polygon(52% 100%, 54% 100%, 52% 100%, 50% 100%);
    transition: clip-path 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.1s ease;
    pointer-events:none;
  }

  /* ── CONTENT WRAPPERS ── */
  .content { padding:60px; display:flex; flex-direction:column; justify-content:center; height:100%; width:50vw; transition: opacity 0.3s ease, transform 0.6s ease; }
  .med-title { color:#1a0040; font-size:42px; font-weight:900; line-height:1.1; margin-bottom:20px; }
  .eng-title { color:#ffffff; font-size:42px; font-weight:900; line-height:1.1; margin-bottom:20px; }
  .eng-title span { color:#00C8B4; }
  
  .btn {
    display:inline-block; padding:14px 30px; border-radius:30px; font-weight:700;
    text-transform:uppercase; font-size:12px; letter-spacing:1px; cursor:pointer; align-self:flex-start;
    box-shadow: 0 4px 14px rgba(0,0,0,0.2);
  }
  .med-btn { background:#1a0040; color:#FFD700; }
  .eng-btn { background:#00C8B4; color:#0a1628; }

  /* ── CANVAS FOR DATA DEFRAG ── */
  #defragCanvas { position:absolute; top:0; left:52%; width:48%; height:100%; z-index:5; pointer-events:none; display:none; }

  /* ── ENGINEERING SOLID OVERLAY WIPE ── */
  .eng-wipe-overlay {
    position:absolute; top:0; right:0; width:48%; height:0%; background:#0a1628; z-index:6;
    transition: height 0.45s cubic-bezier(0.76, 0, 0.24, 1);
  }
</style>
</head>
<body>

<div class="split-container">
  
  <div class="med-panel" id="medPanel">
    <div class="content" id="medContent">
      <h1 class="med-title">Medical Stream<br>Laser Incision Engine</h1>
      <div class="btn med-btn" id="medBtn">Execute Laser Burn →</div>
    </div>
  </div>

  <div class="seam" id="seamLine"></div>
  <div class="laser-beam" id="laserBeam"></div>

  <div class="eng-panel" id="engPanel">
    <canvas id="defragCanvas"></canvas>
    <div class="eng-wipe-overlay" id="engWipe"></div>
    
    <div class="content" id="engContent">
      <h1 class="eng-title">Engineering Stream<br><span>Data Defrag Concept</span></h1>
      <div class="btn eng-btn" id="engBtn">Test Data Defrag →</div>
    </div>
  </div>

</div>

<script>
const medPanel   = document.getElementById('medPanel');
const engPanel   = document.getElementById('engPanel');
const seamLine   = document.getElementById('seamLine');
const laserBeam  = document.getElementById('laserBeam');
const medContent = document.getElementById('medContent');
const engContent = document.getElementById('engContent');
const engWipe    = document.getElementById('engWipe');
const canvas     = document.getElementById('defragCanvas');
const ctx        = canvas.getContext('2d');

let isRunning = false;

// ── 1. CINEMATIC MEDICAL TRANSITION: LASER INCISION ──
document.getElementById('medBtn').addEventListener('click', function() {
  if (isRunning) return;
  isRunning = true;
  
  // Fade engineering text out and give it a slight physical push backward
  engContent.style.opacity = '0';
  engContent.style.transform = 'scale(0.95)';
  
  // Ignite laser spark at base of split line
  laserBeam.style.opacity = '1';
  laserBeam.style.clipPath = 'polygon(50% 100%, 54% 100%, 52% 100%, 50% 100%)';
  
  setTimeout(() => {
    // Laser slices lightning fast straight up to the top ceiling edge
    laserBeam.style.clipPath = 'polygon(44% 0, 56% 0, 52% 100%, 48% 100%)';
    
    setTimeout(() => {
      // Pull laser back, split container wide open dynamically snapping into full width
      laserBeam.style.opacity = '0';
      
      medPanel.style.width = '100%';
      seamLine.style.width = '100%';
      medPanel.style.clipPath = 'polygon(0 0, 100% 0, 100% 100%, 0 100%)';
      seamLine.style.clipPath = 'polygon(0 0, 100% 0, 100% 100%, 0 100%)';
      
      // Elastic kick animation on the background layer
      engPanel.style.transform = 'translateX(80px)';
      
      setTimeout(() => { alert('Cinematic Medical Matrix Loaded! Resetting...'); location.reload(); }, 850);
    }, 250);
  }, 100);
});

// ── 2. ENGINEERING TRANSITION: DATA STREAM DEFRAGMENTATION ──
document.getElementById('engBtn').addEventListener('click', function() {
  if (isRunning) return;
  isRunning = true;
  
  medContent.style.opacity = '0';
  engContent.style.opacity = '0';
  
  canvas.style.display = 'block';
  canvas.width = window.innerWidth * 0.48;
  canvas.height = window.innerHeight;
  
  const columns = Math.floor(canvas.width / 14);
  const drops = Array(columns).fill(0);
  
  function drawMatrix() {
    ctx.fillStyle = 'rgba(10, 22, 40, 0.15)'; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = '#00C8B4'; 
    ctx.font = '12px monospace';
    
    for (let i = 0; i < drops.length; i++) {
      const text = Math.random() > 0.5 ? "1" : "0";
      const x = i * 14;
      const y = drops[i] * 14;
      
      ctx.fillText(text, x, y);
      
      if (y > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }
      drops[i]++;
    }
  }
  
  const matrixInterval = setInterval(drawMatrix, 20);
  
  setTimeout(() => {
    // Fill background panel from up to down cleanly
    engWipe.style.height = '100%';
    
    setTimeout(() => {
      medPanel.style.width = '0%';
      seamLine.style.width = '0%';
      medPanel.style.clipPath = 'polygon(0 0, 0 0, 0 100%, 0 100%)';
      seamLine.style.clipPath = 'polygon(0 0, 0 0, 0 100%, 0 100%)';
      
      setTimeout(() => { 
        clearInterval(matrixInterval);
        alert('Cinematic Engineering Matrix Loaded! Resetting...'); 
        location.reload(); 
      }, 500);
    }, 350);
  }, 400);
});
</script>
</body>
</html>
