<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASMI Career — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100vw;height:100vh;overflow:hidden;background:#1a0040;}

  iframe{
    width:100vw;height:100vh;
    border:none;display:block;
    opacity:0;transition:opacity .4s ease;
  }
  iframe.ready{opacity:1;}

  /* ── LOADING OVERLAY ── */
  #loadingOverlay{
    position:fixed;inset:0;z-index:999;
    background:linear-gradient(135deg,#1a0040 0%,#2D0A5E 50%,#6a0dad 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    transition:opacity .55s ease;
  }
  #loadingOverlay.hidden{
    opacity:0;pointer-events:none;
  }

  /* Bouncing logo mark */
  .loader-mark{
  width:140px;height:auto;
  animation:bounce 1s ease-in-out infinite alternate;
  filter:drop-shadow(0 12px 24px rgba(255,215,0,.25));
  mix-blend-mode: screen;  /* ADD THIS */
}
  @keyframes bounce{
  from{transform:scale(1);   filter:drop-shadow(0 12px 24px rgba(255,215,0,.25));}
  to  {transform:scale(1.08);filter:drop-shadow(0 18px 40px rgba(255,215,0,.55));}
}

  /* Pulsing dots */
  .loader-dots{display:flex;gap:8px;margin-top:4px;}
  .loader-dots span{
    width:7px;height:7px;border-radius:50%;background:rgba(255,215,0,.50);
    animation:dot-pulse 1.2s ease-in-out infinite;
  }
  .loader-dots span:nth-child(2){animation-delay:.2s;}
  .loader-dots span:nth-child(3){animation-delay:.4s;}
  @keyframes dot-pulse{
    0%,100%{opacity:.3;transform:scale(.8);}
    50%    {opacity:1; transform:scale(1.2);}
  }

  .loader-text{
    font-family:'Montserrat';font-size:.82rem;font-weight:700;
    color:rgba(255,255,255,.60);letter-spacing:2px;text-transform:uppercase;
  }

  .loader-sub{
    font-family:'Montserrat';font-size:.65rem;font-weight:600;
    color:rgba(255,255,255,.30);letter-spacing:1px;
    margin-top:-8px;
  }
</style>
</head>
<body>

<!-- ── LOADING SCREEN ── -->
<div id="loadingOverlay">
  <img class="loader-mark" src="asmi-logo.png" alt="ASMI Career">
  <div class="loader-text">ASMI Career</div>
  <div class="loader-dots">
    <span></span><span></span><span></span>
  </div>
  <div class="loader-sub">Preparing your admission analysis...</div>
</div>

<!-- ── SLIDE FRAME ── -->
<iframe id="slideFrame" src="" allowfullscreen></iframe>

<script>
  const token = new URLSearchParams(location.search).get('token') || '';
  const frame = document.getElementById('slideFrame');
  const overlay = document.getElementById('loadingOverlay');

  // Load slide 1 with token
  frame.src = 'slide1_welcome.html?token=' + encodeURIComponent(token);

  // When iframe is ready — fade out loader, fade in iframe
  frame.addEventListener('load', function() {
    // Small extra delay so fonts/assets inside iframe settle
    setTimeout(function() {
      overlay.classList.add('hidden');
      frame.classList.add('ready');
    }, 600);
  });

  // Safety fallback — hide loader after 4s regardless
  setTimeout(function() {
    overlay.classList.add('hidden');
    frame.classList.add('ready');
  }, 4000);
</script>

</body>
</html>
