<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASMI Career — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100vw;height:100vh;overflow:hidden;background:#1a0040;}

  iframe{
    width:100vw;height:100vh;
    border:none;display:block;
    opacity:0;transition:opacity .4s ease;
  }
  iframe.ready{opacity:1;}

  /* ── LOADING OVERLAY ── */
  #loadingOverlay{
    position:fixed;inset:0;z-index:999;
    background:linear-gradient(135deg,#1a0040 0%,#2D0A5E 50%,#6a0dad 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    transition:opacity .55s ease;
  }
  #loadingOverlay.hidden{
    opacity:0;pointer-events:none;
  }

  /* Bouncing logo mark */
  .loader-mark{
  width:140px;height:120px;
  animation:bounce 1s ease-in-out infinite alternate;
  filter:drop-shadow(0 12px 24px rgba(255,215,0,.25));
  mix-blend-mode: screen;  /* ADD THIS */
}
  @keyframes bounce{
  from{transform:scale(1);   filter:drop-shadow(0 12px 24px rgba(255,215,0,.25));}
  to  {transform:scale(1.08);filter:drop-shadow(0 18px 40px rgba(255,215,0,.55));}
}

  /* Pulsing dots */
  .loader-dots{display:flex;gap:8px;margin-top:4px;}
  .loader-dots span{
    width:7px;height:7px;border-radius:50%;background:rgba(255,215,0,.50);
    animation:dot-pulse 1.2s ease-in-out infinite;
  }
  .loader-dots span:nth-child(2){animation-delay:.2s;}
  .loader-dots span:nth-child(3){animation-delay:.4s;}
  @keyframes dot-pulse{
    0%,100%{opacity:.3;transform:scale(.8);}
    50%    {opacity:1; transform:scale(1.2);}
  }

  .loader-text{
    font-family:'Montserrat';font-size:.82rem;font-weight:700;
    color:rgba(255,255,255,.60);letter-spacing:2px;text-transform:uppercase;
  }

  .loader-sub{
    font-family:'Montserrat';font-size:.65rem;font-weight:600;
    color:rgba(255,255,255,.30);letter-spacing:1px;
    margin-top:-8px;
  }
@media (max-width: 768px) {
  .loader-mark { width: 100px; }
  .loader-text { font-size: .75rem; }
}

#saveShortlistBtn {
  position: fixed;
  bottom: 60px;
  right: 20px;
  z-index: 1000;
  background: linear-gradient(135deg, #1a0040, #6a0dad);
  color: #FFD700;
  border: 1.5px solid rgba(255, 215, 0, 0.45);
  border-radius: 50px;
  padding: 10px 20px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: 0.82rem;
  letter-spacing: 0.5px;
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(26, 0, 64, 0.35);
  display: none; /* hidden by default */
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s ease;
}
#saveShortlistBtn:hover {
  transform: scale(1.04);
  box-shadow: 0 12px 30px rgba(26, 0, 64, 0.45);
  background: linear-gradient(135deg, #2D0A5E, #8b25cc);
  border-color: #FFD700;
}
#saveShortlistBtn:active {
  transform: scale(0.98);
}
</style>
</head>
<body>

<!-- ── LOADING SCREEN ── -->
<div id="loadingOverlay">
  <img class="loader-mark" src="asmi-logo.png" alt="ASMI Career">
  <div class="loader-dots">
    <span></span><span></span><span></span>
  </div>
  <div class="loader-sub">Preparing your admission analysis...</div>
</div>

<!-- ── SLIDE FRAME ── -->
<iframe id="slideFrame" src="" allowfullscreen></iframe>

<!-- ── SAVE SHORTLIST FLOATING BUTTON ── -->
<button id="saveShortlistBtn">💾 Save Shortlist</button>

<script>
  const token  = new URLSearchParams(location.search).get('token') || '';
  const mode   = new URLSearchParams(location.search).get('mode') || '';
  const frame  = document.getElementById('slideFrame');
  const overlay= document.getElementById('loadingOverlay');

  // Store mode in sessionStorage so all slides can read it
  try {
    const s = JSON.parse(sessionStorage.getItem('asmi') || '{}');
    s.mode = mode;
    sessionStorage.setItem('asmi', JSON.stringify(s));
  } catch(e){}

  // Counsel mode starts at Slide 2, sales mode starts at Slide 1
  const startSlide = mode === 'counsel'
    ? 'slide2_profile.html?token=' + encodeURIComponent(token) + '&mode=counsel'
    : 'slide1_welcome.html?token='  + encodeURIComponent(token);

  frame.src = startSlide;

  // When iframe is ready — fade out loader, fade in iframe
  frame.addEventListener('load', function() {
    // Small extra delay so fonts/assets inside iframe settle
    setTimeout(function() {
      overlay.classList.add('hidden');
      frame.classList.add('ready');
    }, 600);
  });

  // Safety fallback — hide loader after 4s regardless
  setTimeout(function() {
    overlay.classList.add('hidden');
    frame.classList.add('ready');
  }, 4000);

  // ── SAVE SHORTLIST LOGIC ──
  const saveBtn = document.getElementById('saveShortlistBtn');
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_0k81uo0WOYsHaghxqlMBBdJMmc0c4TzYDjnLpsqtQ2yhzhPkVlfmxZ_mmVrh_pls/exec';

  function updateSaveButtonVisibility() {
    try {
      const currentUrl = frame.contentWindow.location.href;
      if (currentUrl.includes('slide3_options') || currentUrl.includes('slide4_recommended')) {
        saveBtn.style.display = 'flex';
      } else {
        saveBtn.style.display = 'none';
      }
    } catch (e) {
      console.error('Save button visibility check failed:', e);
      saveBtn.style.display = 'none';
    }
  }

  frame.addEventListener('load', updateSaveButtonVisibility);

  saveBtn.addEventListener('click', async () => {
    const originalText = saveBtn.innerHTML;
    saveBtn.innerHTML = '⏳ Saving...';
    saveBtn.style.pointerEvents = 'none';

    try {
      const sess = JSON.parse(sessionStorage.getItem('asmi') || '{}');
      const shortlist = sess.shortlist || [];

      // 1. Save to Sales Pitch Sheet (Registered Students)
      const payloadSales = new URLSearchParams();
      payloadSales.append('action', 'saveShortlist');
      payloadSales.append('token', token);
      payloadSales.append('shortlist', JSON.stringify(shortlist));

      const reqSales = fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: payloadSales
      });

      // 2. Save to Student Dashboard Sheet
      const collegesList = shortlist.map(c => ({
        name: c.n,
        probability: c.probKey || c.prob || 'Likely',
        cr: c.c || ''
      }));

      const STUDENT_APPS_SCRIPT = 'https://script.google.com/macros/s/AKfycbyL1UC5_EGNPKZcitbkQ38HOnKzgj5ObTZGroPcH0kpyHtjY-SpYYtyl3_jH0-rUR-x/exec';
      
      const reqStudent = fetch(STUDENT_APPS_SCRIPT, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify({
          action: 'saveShortlist',
          inquiry_token: token,
          colleges: collegesList
        })
      });

      // Wait for both to finish
      const [resSales, resStudent] = await Promise.all([reqSales, reqStudent]);

      if (!resSales.ok || !resStudent.ok) {
        throw new Error('One of the networks responses was not ok');
      }

      const jsonStudent = await resStudent.json();
      if (jsonStudent.error) {
         throw new Error('Student Dashboard Error: ' + jsonStudent.error);
      }

      saveBtn.innerHTML = '✓ Saved!';
      saveBtn.style.background = '#15803d'; // Success green
      saveBtn.style.borderColor = '#22c55e';

      setTimeout(() => {
        saveBtn.innerHTML = originalText;
        saveBtn.style.background = '';
        saveBtn.style.borderColor = '';
        saveBtn.style.pointerEvents = 'auto';
      }, 2000);

    } catch (error) {
      console.error('Error saving shortlist:', error);
      saveBtn.innerHTML = '⚠️ Failed';
      saveBtn.style.background = '#b91c1c'; // Error red
      saveBtn.style.borderColor = '#ef4444';

      setTimeout(() => {
        saveBtn.innerHTML = originalText;
        saveBtn.style.background = '';
        saveBtn.style.borderColor = '';
        saveBtn.style.pointerEvents = 'auto';
      }, 3000);
    }
  });
</script>


<script>
(function () {
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) return;
  document.querySelectorAll('a[href]').forEach(link => {
    try {
      const url = new URL(link.href, window.location.origin);
      if (url.origin === window.location.origin && !url.searchParams.has('token')) {
        url.searchParams.set('token', token);
        link.href = url.toString();
      }
    } catch(e) {}
  });
})();
</script>
<script>
  (function () {
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (!token) return;

    function fixLinks() {
      document.querySelectorAll('a[href]').forEach(function (link) {
        try {
          const url = new URL(link.href, window.location.origin);
          if (url.origin === window.location.origin && !url.searchParams.has('token')) {
            url.searchParams.set('token', token);
            link.href = url.toString();
          }
        } catch (e) {}
      });
    }

    // Run immediately
    fixLinks();

    // Run again after any dynamic content loads
    setTimeout(fixLinks, 500);
    setTimeout(fixLinks, 1500);

    // Watch for sidebar links added dynamically
    const observer = new MutationObserver(fixLinks);
    observer.observe(document.body, { childList: true, subtree: true });
  })();
</script>
</body>
</html>
